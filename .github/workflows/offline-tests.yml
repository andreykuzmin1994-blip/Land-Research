name: Offline test suite

# The full offline suite (FakeConnection-driven, no network, no secrets,
# ~1s wall clock) on EVERY push and pull request, unconditionally.
#
# The other workflows are path-filtered and collectively leave gaps:
# cli.py appeared in no filter at all, and a runner.py change ran only
# tests.test_discovery. Tier 0 of the review model (STANDING_RISKS.md
# § Change tiers: "tests + CI only") assumes CI always runs the tests —
# this workflow is what makes that assumption true. The suite is cheap
# enough that path-filtering it would save nothing.

on:
  push:
  pull_request:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the full offline suite
        run: python -m unittest discover -s tests -v
